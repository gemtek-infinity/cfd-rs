name: On PR Push - Validate

on:
    pull_request:
        branches:
            - main
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
    workflow_dispatch:

concurrency:
    group: on-pr-push-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    CARGO_TERM_COLOR: always

jobs:
    changes:
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
        runs-on: ubuntu-24.04
        outputs:
            app: ${{ steps.filter.outputs.app }}
            tools: ${{ steps.filter.outputs.tools }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Detect changed paths
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      app:
                        - 'crates/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - 'rustfmt.toml'
                        - 'Justfile'
                      tools:
                        - 'tools/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - '.debtmap.toml'
                        - '.vscode/mcp.json'
                        - 'Justfile'
                        - 'STATUS.md'
                        - 'REWRITE_CHARTER.md'
                        - 'docs/ai-context-routing.md'
                        - 'docs/phase-5/**'
                        - 'docs/parity/**'
                        - 'docs/promotion-gates.md'
                        - 'docs/compatibility-scope.md'
                        - 'docs/dependency-policy.md'
                        - 'docs/allocator-runtime-baseline.md'
                        - 'docs/go-rust-semantic-mapping.md'
                        - 'docs/adr/**'
                        - 'crates/**/README.md'

    validate-governance:
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install just
              uses: taiki-e/install-action@just
            - name: Validate governance and prep contracts
              run: just validate-governance

    validate-app:
        needs: changes
        if: ${{ needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch' }}
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install just
              uses: taiki-e/install-action@just
            - name: Install stable toolchain
              run: |
                  rustup toolchain install stable --profile minimal --no-self-update
                  rustup component add clippy --toolchain stable
                  rustup default stable
                  rustc -Vv
                  cargo -V
            - name: Install nightly rustfmt
              run: |
                  rustup toolchain install nightly --profile minimal --no-self-update
                  rustup component add rustfmt --toolchain nightly
                  rustup run nightly rustfmt -V
            - name: Cache Cargo registry and build
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/registry/index
                      ~/.cargo/registry/cache
                      ~/.cargo/git/db
                      target
                  key: ${{ runner.os }}-cargo-app-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-app-
            - name: Validate app crates
              run: just validate-app

    validate-tools:
        needs: changes
        if: ${{ needs.changes.outputs.tools == 'true' || github.event_name == 'workflow_dispatch' }}
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install just
              uses: taiki-e/install-action@just
            - name: Install stable toolchain
              run: |
                  rustup toolchain install stable --profile minimal --no-self-update
                  rustup component add clippy --toolchain stable
                  rustup default stable
                  rustc -Vv
                  cargo -V
            - name: Install nightly rustfmt
              run: |
                  rustup toolchain install nightly --profile minimal --no-self-update
                  rustup component add rustfmt --toolchain nightly
                  rustup run nightly rustfmt -V
            - name: Cache Cargo registry and build
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/registry/index
                      ~/.cargo/registry/cache
                      ~/.cargo/git/db
                      target
                  key: ${{ runner.os }}-cargo-tools-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-tools-
            - name: Validate tool crates and MCP surfaces
              run: just validate-tools

    ci-gate:
        if: ${{ always() }}
        needs: [changes, validate-governance, validate-app, validate-tools]
        runs-on: ubuntu-24.04
        steps:
            - name: Check upstream results
              run: |
                  echo "validate-governance: ${{ needs.validate-governance.result }}"
                  echo "validate-app: ${{ needs.validate-app.result }}"
                  echo "validate-tools: ${{ needs.validate-tools.result }}"

                  for result in "${{ needs.validate-governance.result }}" "${{ needs.validate-app.result }}" "${{ needs.validate-tools.result }}"; do
                    if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                      echo "::error::Upstream job failed or was cancelled (result: $result)"
                      exit 1
                    fi
                  done

                  echo "All upstream jobs passed or were skipped."
