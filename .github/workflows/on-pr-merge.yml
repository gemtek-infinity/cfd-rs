name: On PR Merge - Build Preview Artifacts

on:
    pull_request:
        branches:
            - main
        types:
            - closed
    workflow_dispatch:

concurrency:
    group: on-pr-merge-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    CARGO_TERM_COLOR: always

jobs:
    test:
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install just
              uses: taiki-e/install-action@just
            - name: Install stable toolchain
              run: |
                  rustup toolchain install stable --profile minimal --no-self-update
                  rustup default stable
                  rustc -Vv
                  cargo -V
            - name: Cache Cargo registry and build
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/registry/index
                      ~/.cargo/registry/cache
                      ~/.cargo/git/db
                      target
                  key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-test-
            - name: Test preview gate
              run: just preview-test

    build-preview:
        needs: test
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: false
            matrix:
                lane:
                    - x86-64-v2
                    - x86-64-v4
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install just
              uses: taiki-e/install-action@just
            - name: Install stable toolchain
              run: |
                  rustup toolchain install stable --profile minimal --no-self-update
                  rustup default stable
                  rustc -Vv
                  cargo -V
            - name: Cache Cargo registry and build
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/registry/index
                      ~/.cargo/registry/cache
                      ~/.cargo/git/db
                      target
                  key: ${{ runner.os }}-cargo-release-${{ matrix.lane }}-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-release-${{ matrix.lane }}-
            - name: Build release binary (${{ matrix.lane }})
              run: just preview-build ${{ matrix.lane }}
            - name: Smoke-test deployment contract (${{ matrix.lane }})
              run: just preview-smoke ${{ matrix.lane }}
            - name: Package preview artifact (${{ matrix.lane }})
              run: just preview-package ${{ matrix.lane }}
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: cloudflared-${{ github.sha }}-linux-x86_64-gnu-${{ matrix.lane }}
                  path: |
                      cloudflared-${{ github.sha }}-linux-x86_64-gnu-${{ matrix.lane }}.tar.gz
                      cloudflared-${{ github.sha }}-linux-x86_64-gnu-${{ matrix.lane }}.tar.gz.sha256
                  retention-days: 30
